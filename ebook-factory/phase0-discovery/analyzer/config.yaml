# Analyzer Configuration

# KDP Data Sources
kdp_directory: "/home/bookforge/Downloads"
kdp_file_patterns:
  dashboard: "KDP_Dashboard-*.xlsx"
  prior_month: "KDP_Prior_Month_Royalties-*.xlsx"

# Output Configuration
learning_md_path: "/home/bookforge/books/factory/LEARNING.md"

# Metrics Thresholds (for pattern detection)
metrics:
  min_royalty_per_unit: 3.00  # Minimum acceptable royalty per sale
  min_kenp_per_unit: 20       # Minimum acceptable KENP pages per sale
  high_kenp_threshold: 50     # "High engagement" KENP threshold
  niche_score_weights:
    royalty: 0.4
    units: 0.3
    kenp: 0.3

# Niche Categories (for pattern grouping)
niche_patterns:
  - {keywords: ["security", "network", "protection", "hacking", "privacy", "digital privacy"], category: "tech-security"}
  - {keywords: ["second brain", "productivity", "review", "systems", "organization", "time blocking", "80/20", "pareto", "getting more done"], category: "productivity"}
  - {keywords: ["gut health", "walking", "sleep", "fatigue", "fitness", "weight loss", "health"], category: "health-wellness"}
  - {keywords: ["ai tools", "ai revolution", "artificial intelligence", "chatgpt", "automation"], category: "ai-productivity"}
  - {keywords: ["parenting", "digital kids", "screen", "children", "family"], category: "parenting-modern"}
  - {keywords: ["finance", "money", "budget", "debt", "invest", "income"], category: "finance-personal"}
  - {keywords: ["python", "programming", "coding", "developer", "javascript"], category: "tech-programming"}

# Marketplace Configuration
marketplace_currency_map:
  "United States": "USD"
  "Canada": "CAD"
  "United Kingdom": "GBP"
  "Germany": "EUR"
  "France": "EUR"
  "Italy": "EUR"
  "Spain": "EUR"
  "Brazil": "BRL"
  "Japan": "JPY"
  "India": "INR"

# Analysis Settings
analysis:
  track_competitors: false  # Phase 1: disabled
  track_seasonal_trends: false  # Phase 2: enable
  auto_trigger_planner: true  # Notify Planner after analysis
