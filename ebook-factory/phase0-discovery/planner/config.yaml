# Planner Configuration

learning_md_path: /home/bookforge/books/factory/LEARNING.md
output_path: /home/bookforge/.hermes/output/planner/topic_plan_latest.md

scoring:
  roi_weight: 0.4         # Return on investment
  engagement_weight: 0.3  # Reader engagement (KENP/unit)
  market_weight: 0.2      # Market potential
  expertise_weight: 0.1   # Writer's expertise fit

filters:
  min_roi_per_unit: 2.50      # Minimum expected revenue per unit
  min_kenp_per_unit: 5        # Minimum pages read per unit (lowered — early catalog has sparse KENP data)
  max_competition: "medium"   # Filter out "high" competition niches
  min_market_size: 100        # Minimum monthly search volume (lowered for bootstrapping)

generation:
  max_topics: 5               # Maximum topics to recommend
  include_competitors: true   # Include competitor analysis
  include_angle: true         # Include unique angle suggestions
